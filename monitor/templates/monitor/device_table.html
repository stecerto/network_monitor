<table class="table table-bordered table-hover">

    <thead class="table-light">
        <tr>
        <th>Name</th>
        <th>Status</th>
        <th>Last Check</th>
        </tr>
    </thead>

    <tbody>

    {% for device in devices %}

    <tr>

        <td>
        <a href="{% url 'device_detail' device.id %}">{{ device.name }}</a>
        </td>

        <td>
            {% if device.status %}
                🟢 Online
            {% else %}
                🔴 Offline
            {% endif %}
        </td>

        <td class="text-muted">
        {{ device.last_check|date:"d.m.Y H:i:s" }}
        </td>

    </tr>
    {% empty %}
        <tr>
            <td colspan="6" class="text-center text-muted">No devices found.</td>
        </tr>

    {% endfor %}

    </tbody>
</table>
